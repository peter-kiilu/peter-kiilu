name: Metrics update
on:
  schedule:
    - cron: "0 0 * * *"   # Daily at midnight UTC
  workflow_dispatch:      # Manual trigger from GitHub Actions tab

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # ===== REQUIRED =====
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          output_action: write
          
          # ===== BASE SECTIONS =====
          base: header, activity, community, repositories
          base_indepth: yes
          base_repositories: 10    # Show up to 10 repos
          
          # ===== MAIN STATS CARD =====
          plugin_stats: yes
          plugin_stats_limit: 2
          plugin_stats_freeze: no
          
          # ===== TOP LANGUAGES =====
          plugin_languages: yes
          plugin_languages_limit: 6
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 15
          
          # ===== ACHIEVEMENTS =====
          plugin_achievements: yes
          plugin_achievements_limit: 0      # 0 = show all
          plugin_achievements_threshold: B  # Show from rank B upwards
          
          # ===== HABITS / CODING CHARTS =====
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_days: 30
          
          # ===== CONTRIBUTION CALENDAR =====
          plugin_calendar: yes
          plugin_calendar_limit: 1
          
          # ===== RECENT ACTIVITY =====
          plugin_activity: yes
          plugin_activity_limit: 6
          plugin_activity_days: 14
          plugin_activity_filter: issue, pr, release, fork, commit
          
          # ===== NOTABLE CONTRIBUTIONS =====
          plugin_notable: yes
          plugin_notable_types: commit, pull_request, issue
          plugin_notable_indepth: yes
          
      
          
          # ===== FOLLOW UP (shows issues/PRs you reacted to) =====
          plugin_followup: yes
          plugin_followup_sections: repositories, user
